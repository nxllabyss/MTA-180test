<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Bilim Sinovi — Ma'lumotlar tuzilmalari va algoritmlar</title>
<style>
  :root{
    --bg:#ffffff;
    --surface:#ffffff;
    --surface-alt:#f7f7f9;
    --surface-alt-2:#f1f1f4;
    --border:#e9e9ec;
    --border-soft:#f0f0f2;
    --ink:#1c1c1e;
    --ink-soft:#6e6e73;
    --ink-faint:#a3a3a8;
    --accent:#232326;
    --accent-hover:#000000;
    --success:#1e8e5a;
    --success-bg:#eaf7f0;
    --success-border:#c7ead9;
    --danger:#c0392b;
    --danger-bg:#fdecea;
    --danger-border:#f4c7c1;
    --radius-xl:28px;
    --radius-lg:22px;
    --radius-md:16px;
    --radius-sm:11px;
    --shadow-soft:0 1px 2px rgba(20,20,25,0.04), 0 10px 30px rgba(20,20,25,0.05);
    --shadow-lift:0 4px 10px rgba(20,20,25,0.06), 0 20px 48px rgba(20,20,25,0.09);
    --font-display: 'Iowan Old Style','Palatino Linotype','Book Antiqua', Georgia, 'Times New Roman', serif;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    --ease: cubic-bezier(.22,.61,.36,1);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:var(--font-body);
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
    min-height:100vh;
    overflow-x:hidden;
  }
  h1,h2,h3,h4{font-family:var(--font-display); margin:0; font-weight:600; letter-spacing:-0.01em;}
  p{margin:0;}
  button{font-family:inherit;}

  ::selection{background:#dcdce0;}

  /* Layout shells */
  .app{
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }
  .wrap{
    width:100%;
    max-width:900px;
    margin:0 auto;
    padding:0 24px;
  }

  /* ============ TOP BAR (ambient) ============ */
  .ambient-grain{
    position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image: radial-gradient(circle at 1px 1px, rgba(0,0,0,0.018) 1px, transparent 0);
    background-size: 22px 22px;
  }

  /* ============ SCREENS ============ */
  .screen{
    position:relative;
    z-index:1;
    flex:1;
    display:none;
    flex-direction:column;
    animation: fadeSlideIn .5s var(--ease);
  }
  .screen.active{display:flex;}

  @keyframes fadeSlideIn{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
  }
  @media (prefers-reduced-motion: reduce){
    .screen{animation:none;}
    *{animation-duration:0.001ms !important; transition-duration:0.001ms !important;}
  }

  /* ============ HOME SCREEN ============ */
  .home-hero{
    padding:76px 0 40px;
    text-align:center;
  }
  .eyebrow{
    font-size:12.5px;
    letter-spacing:.16em;
    text-transform:uppercase;
    color:var(--ink-faint);
    font-weight:600;
    margin-bottom:18px;
  }
  .home-title{
    font-size:clamp(34px, 5.4vw, 54px);
    line-height:1.08;
    color:var(--ink);
  }
  .home-title em{
    font-style:italic;
    color:var(--ink-soft);
  }
  .home-sub{
    margin-top:18px;
    font-size:16.5px;
    color:var(--ink-soft);
    max-width:520px;
    margin-left:auto;
    margin-right:auto;
    line-height:1.6;
  }
  .home-stats{
    display:flex;
    justify-content:center;
    gap:36px;
    margin-top:34px;
    flex-wrap:wrap;
  }
  .home-stat{
    text-align:center;
  }
  .home-stat .num{
    font-family:var(--font-display);
    font-size:26px;
    color:var(--ink);
  }
  .home-stat .lbl{
    font-size:11.5px;
    color:var(--ink-faint);
    text-transform:uppercase;
    letter-spacing:.1em;
    margin-top:2px;
  }

  .cat-grid{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:16px;
    padding:8px 0 90px;
  }
  @media (min-width:720px){
    .cat-grid{grid-template-columns:repeat(3, 1fr);}
  }

  .cat-card{
    position:relative;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius-lg);
    padding:26px 22px;
    text-align:left;
    cursor:pointer;
    transition:transform .35s var(--ease), box-shadow .35s var(--ease), border-color .35s var(--ease);
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    min-height:172px;
    overflow:hidden;
  }
  .cat-card:hover{
    transform:translateY(-4px);
    box-shadow:var(--shadow-lift);
    border-color:var(--border-soft);
  }
  .cat-card:active{transform:translateY(-1px);}
  .cat-card .cat-index{
    font-family:var(--font-display);
    font-style:italic;
    font-size:15px;
    color:var(--ink-faint);
  }
  .cat-card h3{
    font-size:19px;
    line-height:1.28;
    margin-top:14px;
    color:var(--ink);
    font-weight:600;
  }
  .cat-card .cat-meta{
    margin-top:16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .cat-card .cat-count{
    font-size:12.5px;
    color:var(--ink-soft);
  }
  .cat-card .cat-arrow{
    width:34px;height:34px;
    border-radius:50%;
    background:var(--surface-alt);
    display:flex;align-items:center;justify-content:center;
    transition:background .3s var(--ease), transform .3s var(--ease);
  }
  .cat-card:hover .cat-arrow{
    background:var(--accent);
    transform:rotate(45deg);
  }
  .cat-card:hover .cat-arrow svg{stroke:#fff;}
  .cat-card .cat-arrow svg{stroke:var(--ink); transition:stroke .3s var(--ease);}

  /* ============ TEST SCREEN ============ */
  .test-topbar{
    position:sticky; top:0; z-index:5;
    background:rgba(255,255,255,0.88);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    border-bottom:1px solid var(--border-soft);
    padding:16px 0 14px;
  }
  .test-topbar-inner{
    display:flex; align-items:center; justify-content:space-between;
    gap:12px;
  }
  .test-cat-name{
    font-size:13px;
    font-weight:600;
    color:var(--ink-soft);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .test-progress-text{
    font-size:13px;
    color:var(--ink-faint);
    font-variant-numeric:tabular-nums;
    white-space:nowrap;
  }
  .home-link{
    display:flex; align-items:center; gap:6px;
    background:none; border:none; cursor:pointer;
    color:var(--ink-faint);
    font-size:13px;
    padding:6px 4px;
    transition:color .25s var(--ease);
  }
  .home-link:hover{color:var(--ink);}

  .progress-bar-track{
    height:3px;
    background:var(--border-soft);
    border-radius:2px;
    margin-top:12px;
    overflow:hidden;
  }
  .progress-bar-fill{
    height:100%;
    background:var(--ink);
    border-radius:2px;
    transition:width .5s var(--ease);
  }

  .test-body{
    flex:1;
    padding:44px 0 140px;
  }

  .question-card{
    animation: qEnter .45s var(--ease);
  }
  @keyframes qEnter{
    from{opacity:0; transform:translateY(14px);}
    to{opacity:1; transform:translateY(0);}
  }

  .q-head{
    display:flex; align-items:flex-start; justify-content:space-between;
    gap:16px;
    margin-bottom:22px;
  }
  .q-text{
    font-family:var(--font-display);
    font-size:clamp(21px, 3vw, 27px);
    line-height:1.4;
    color:var(--ink);
    font-weight:600;
    flex:1;
  }

  .shuffle-btn{
    display:flex; align-items:center; gap:7px;
    background:var(--surface-alt);
    border:1px solid var(--border);
    color:var(--ink-soft);
    font-size:12.5px;
    font-weight:600;
    padding:9px 14px;
    border-radius:999px;
    cursor:pointer;
    white-space:nowrap;
    transition:background .3s var(--ease), color .3s var(--ease), transform .2s var(--ease), opacity .3s var(--ease);
    flex-shrink:0;
  }
  .shuffle-btn:hover:not(:disabled){background:var(--surface-alt-2); color:var(--ink);}
  .shuffle-btn:active:not(:disabled){transform:scale(0.96);}
  .shuffle-btn:disabled{opacity:.4; cursor:not-allowed;}
  .shuffle-btn svg{width:14px;height:14px; transition:transform .5s var(--ease);}
  .shuffle-btn.spin svg{transform:rotate(220deg);}

  .options{
    display:flex;
    flex-direction:column;
    gap:12px;
  }

  .option{
    position:relative;
    display:flex;
    align-items:center;
    gap:14px;
    text-align:left;
    background:var(--surface);
    border:1.5px solid var(--border);
    border-radius:var(--radius-md);
    padding:17px 18px;
    cursor:pointer;
    transition:border-color .28s var(--ease), background .28s var(--ease), transform .18s var(--ease), box-shadow .28s var(--ease);
  }
  .option:hover:not(.locked){
    border-color:#c9c9cf;
    background:var(--surface-alt);
  }
  .option:active:not(.locked){transform:scale(0.995);}

  .option .opt-letter{
    flex-shrink:0;
    width:32px; height:32px;
    border-radius:50%;
    background:var(--surface-alt);
    border:1px solid var(--border);
    display:flex; align-items:center; justify-content:center;
    font-size:13px; font-weight:700; color:var(--ink-soft);
    transition:all .28s var(--ease);
  }
  .option .opt-text{
    flex:1;
    font-size:15.5px;
    line-height:1.5;
    color:var(--ink);
  }
  .option .opt-icon{
    flex-shrink:0;
    width:24px;height:24px;
    opacity:0;
    transform:scale(0.5);
    transition:all .3s var(--ease);
  }
  .option .opt-icon svg{width:100%;height:100%;}

  .option.locked{cursor:default;}

  .option.correct-answer{
    border-color:var(--success-border);
    background:var(--success-bg);
  }
  .option.correct-answer .opt-letter{
    background:var(--success); border-color:var(--success); color:#fff;
  }
  .option.correct-answer .opt-text{color:#0f5c39; font-weight:600;}
  .option.correct-answer .opt-icon{opacity:1; transform:scale(1);}
  .option.correct-answer .opt-icon svg{stroke:var(--success);}

  .option.wrong-answer{
    border-color:var(--danger-border);
    background:var(--danger-bg);
    animation: shake .4s var(--ease);
  }
  .option.wrong-answer .opt-letter{
    background:var(--danger); border-color:var(--danger); color:#fff;
  }
  .option.wrong-answer .opt-text{color:#8f2c20; font-weight:600;}
  .option.wrong-answer .opt-icon{opacity:1; transform:scale(1);}
  .option.wrong-answer .opt-icon svg{stroke:var(--danger);}

  .option.dimmed{opacity:.55;}

  @keyframes shake{
    0%,100%{transform:translateX(0);}
    22%{transform:translateX(-5px);}
    44%{transform:translateX(4px);}
    66%{transform:translateX(-3px);}
    88%{transform:translateX(2px);}
  }

  .feedback-msg{
    display:flex; align-items:center; gap:8px;
    margin-top:20px;
    padding:13px 18px;
    border-radius:var(--radius-sm);
    font-size:14px;
    font-weight:600;
    max-height:0;
    opacity:0;
    overflow:hidden;
    transition:all .4s var(--ease);
  }
  .feedback-msg.show{
    max-height:60px;
    opacity:1;
    padding:13px 18px;
  }
  .feedback-msg.correct{background:var(--success-bg); color:var(--success);}
  .feedback-msg.incorrect{background:var(--danger-bg); color:var(--danger);}

  /* ============ BOTTOM NAV ============ */
  .test-nav{
    position:fixed; left:0; right:0; bottom:0; z-index:6;
    background:rgba(255,255,255,0.9);
    backdrop-filter:blur(16px);
    -webkit-backdrop-filter:blur(16px);
    border-top:1px solid var(--border-soft);
    padding:16px 0 max(16px, env(safe-area-inset-bottom));
  }
  .test-nav-inner{
    display:flex; align-items:center; gap:10px;
  }
  .btn{
    border:none;
    border-radius:999px;
    padding:15px 22px;
    font-size:14.5px;
    font-weight:700;
    cursor:pointer;
    transition:transform .18s var(--ease), background .28s var(--ease), color .28s var(--ease), box-shadow .28s var(--ease), opacity .28s var(--ease);
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .btn:active:not(:disabled){transform:scale(0.97);}
  .btn:disabled{opacity:.35; cursor:not-allowed;}

  .btn-primary{
    background:var(--accent); color:#fff;
    flex:1.4;
    box-shadow:0 8px 20px rgba(0,0,0,0.14);
  }
  .btn-primary:hover:not(:disabled){background:var(--accent-hover);}

  .btn-ghost{
    background:var(--surface-alt);
    color:var(--ink);
    flex:1;
    border:1px solid var(--border);
  }
  .btn-ghost:hover:not(:disabled){background:var(--surface-alt-2);}

  .btn-finish{
    background:var(--surface);
    color:var(--ink-soft);
    border:1px solid var(--border);
    flex:1;
  }
  .btn-finish:hover:not(:disabled){border-color:var(--ink-faint); color:var(--ink);}

  /* ============ RESULTS SCREEN ============ */
  .results-body{
    padding:60px 0 100px;
  }
  .results-hero{
    text-align:center;
    margin-bottom:44px;
  }
  .score-ring-wrap{
    position:relative;
    width:196px; height:196px;
    margin:0 auto 26px;
  }
  .score-ring-wrap svg{width:100%;height:100%; transform:rotate(-90deg);}
  .score-ring-bg{fill:none; stroke:var(--border-soft); stroke-width:9;}
  .score-ring-fill{
    fill:none; stroke:var(--ink); stroke-width:9; stroke-linecap:round;
    transition:stroke-dashoffset 1.1s var(--ease);
  }
  .score-ring-center{
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
  }
  .score-ring-pct{
    font-family:var(--font-display);
    font-size:44px;
    color:var(--ink);
    line-height:1;
  }
  .score-ring-pct span{font-size:20px; color:var(--ink-faint);}
  .score-grade-label{
    margin-top:6px;
    font-size:12.5px;
    text-transform:uppercase;
    letter-spacing:.1em;
    color:var(--ink-soft);
    font-weight:700;
  }
  .results-title{
    font-size:26px;
    color:var(--ink);
  }
  .results-cat{
    margin-top:8px;
    color:var(--ink-soft);
    font-size:14.5px;
  }

  .results-stats{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:12px;
    margin-bottom:40px;
  }
  .stat-card{
    background:var(--surface-alt);
    border:1px solid var(--border-soft);
    border-radius:var(--radius-md);
    padding:20px 14px;
    text-align:center;
  }
  .stat-card .stat-num{
    font-family:var(--font-display);
    font-size:26px;
    color:var(--ink);
  }
  .stat-card.stat-correct .stat-num{color:var(--success);}
  .stat-card.stat-incorrect .stat-num{color:var(--danger);}
  .stat-card .stat-lbl{
    margin-top:4px;
    font-size:11.5px;
    color:var(--ink-soft);
    text-transform:uppercase;
    letter-spacing:.08em;
  }

  .review-section-title{
    font-size:13px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:.1em;
    color:var(--ink-faint);
    margin-bottom:16px;
  }

  .review-item{
    border:1px solid var(--border-soft);
    border-radius:var(--radius-md);
    padding:20px;
    margin-bottom:14px;
  }
  .review-q{
    font-size:15.5px;
    font-weight:600;
    color:var(--ink);
    margin-bottom:14px;
    line-height:1.5;
  }
  .review-row{
    display:flex; align-items:flex-start; gap:10px;
    font-size:14px;
    padding:9px 0;
  }
  .review-row .tag{
    flex-shrink:0;
    font-size:10.5px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:.06em;
    padding:3px 8px;
    border-radius:5px;
    margin-top:1px;
  }
  .review-row.your .tag{background:var(--danger-bg); color:var(--danger);}
  .review-row.correct .tag{background:var(--success-bg); color:var(--success);}
  .review-row .txt{color:var(--ink); line-height:1.5;}

  .all-correct-note{
    text-align:center;
    padding:50px 20px;
    color:var(--ink-soft);
    font-size:15px;
  }

  .results-actions{
    display:flex; gap:12px;
    margin-top:36px;
  }

  /* Utility */
  .visually-hidden{
    position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0,0,0,0);
  }

  @media (max-width:480px){
    .wrap{padding:0 18px;}
    .home-hero{padding:56px 0 30px;}
    .results-stats{gap:9px;}
  }
</style>
</head>
<body>
<div class="ambient-grain"></div>
<div class="app" id="app">

  <!-- ============ HOME SCREEN ============ -->
  <section class="screen active" id="screen-home">
    <div class="wrap">
      <div class="home-hero">
        <div class="eyebrow">Bilim sinovi</div>
        <h1 class="home-title">Ma'lumotlar tuzilmalari<br><em>va algoritmlar</em></h1>
        <p class="home-sub">180 ta savol, 7 ta bo'lim bo'yicha taqsimlangan. O'zingizga mos bo'limni tanlang va bilimingizni sinab ko'ring.</p>
        <div class="home-stats">
          <div class="home-stat"><div class="num">180</div><div class="lbl">Savollar</div></div>
          <div class="home-stat"><div class="num">7</div><div class="lbl">Bo'limlar</div></div>
          <div class="home-stat"><div class="num">A–D</div><div class="lbl">Variantlar</div></div>
        </div>
      </div>
      <div class="cat-grid" id="cat-grid"></div>
    </div>
  </section>

  <!-- ============ TEST SCREEN ============ -->
  <section class="screen" id="screen-test">
    <div class="test-topbar">
      <div class="wrap">
        <div class="test-topbar-inner">
          <button class="home-link" id="btn-home-from-test" aria-label="Bosh sahifaga qaytish">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
            <span id="test-cat-name" class="test-cat-name"></span>
          </button>
          <div class="test-progress-text" id="test-progress-text">1 / 26</div>
        </div>
        <div class="progress-bar-track"><div class="progress-bar-fill" id="progress-bar-fill" style="width:0%"></div></div>
      </div>
    </div>

    <div class="test-body">
      <div class="wrap">
        <div class="question-card" id="question-card">
          <div class="q-head">
            <h2 class="q-text" id="q-text"></h2>
            <button class="shuffle-btn" id="btn-shuffle" title="Javob variantlarini aralashtirish">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5"/><path d="M4 20L21 3"/><path d="M21 16v5h-5"/><path d="M15 15l6 6"/><path d="M4 4l5 5"/></svg>
              <span>Aralashtirish</span>
            </button>
          </div>
          <div class="options" id="options"></div>
          <div class="feedback-msg" id="feedback-msg"></div>
        </div>
      </div>
    </div>

    <div class="test-nav">
      <div class="wrap">
        <div class="test-nav-inner">
          <button class="btn btn-ghost" id="btn-prev">Orqaga</button>
          <button class="btn btn-finish" id="btn-finish">Yakunlash</button>
          <button class="btn btn-primary" id="btn-next" disabled>Keyingisi</button>
        </div>
      </div>
    </div>
  </section>

  <!-- ============ RESULTS SCREEN ============ -->
  <section class="screen" id="screen-results">
    <div class="wrap">
      <div class="results-body">
        <div class="results-hero">
          <div class="score-ring-wrap">
            <svg viewBox="0 0 120 120">
              <circle class="score-ring-bg" cx="60" cy="60" r="52"/>
              <circle class="score-ring-fill" id="score-ring-fill" cx="60" cy="60" r="52" stroke-dasharray="326.7" stroke-dashoffset="326.7"/>
            </svg>
            <div class="score-ring-center">
              <div class="score-ring-pct" id="score-pct">0<span>%</span></div>
              <div class="score-grade-label" id="score-grade"></div>
            </div>
          </div>
          <h2 class="results-title">Test yakunlandi</h2>
          <p class="results-cat" id="results-cat-name"></p>
        </div>

        <div class="results-stats">

<script>
(function(){
  "use strict";

  var CATEGORIES = TEST_DATA.categories;
  var ALL_QUESTIONS = TEST_DATA.questions;

  // Group questions by category id
  var byCategory = {};
  CATEGORIES.forEach(function(c){ byCategory[c.id] = []; });
  ALL_QUESTIONS.forEach(function(q){ byCategory[q.cat].push(q); });

  // ---------- State ----------
  var state = {
    catId: null,
    catName: '',
    questions: [],      // shuffled working set for this attempt: {q, opts, correct}
    index: 0,
    answers: [],         // per question: {selectedIdx: null|int, isCorrect: null|bool}
  };

  // ---------- Utilities ----------
  function shuffle(arr){
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--){
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }

  function $(id){ return document.getElementById(id); }

  function showScreen(id){
    document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
    $(id).classList.add('active');
    window.scrollTo({top:0, behavior:'instant' in window ? 'instant' : 'auto'});
  }

  var LETTERS = ['A','B','C','D'];

  // ---------- Home screen ----------
  function renderHome(){
    var grid = $('cat-grid');
    grid.innerHTML = '';
    CATEGORIES.forEach(function(cat, i){
      var card = document.createElement('button');
      card.className = 'cat-card';
      card.setAttribute('aria-label', 'Boshlash: ' + cat.name);
      card.innerHTML =
        '<div class="cat-index">' + String(i+1).padStart(2,'0') + '</div>' +
        '<h3>' + escapeHtml(cat.name) + '</h3>' +
        '<div class="cat-meta">' +
          '<span class="cat-count">' + cat.count + ' ta savol</span>' +
          '<span class="cat-arrow"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 19L19 5M19 5H8M19 5V16"/></svg></span>' +
        '</div>';
      card.addEventListener('click', function(){ startTest(cat.id, cat.name); });
      grid.appendChild(card);
    });
  }

  function escapeHtml(str){
    var d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  // ---------- Test flow ----------
  function startTest(catId, catName){
    var pool = byCategory[catId];
    var shuffledQuestions = shuffle(pool).map(function(q){
      return {
        q: q.q,
        opts: q.opts.slice(),
        correct: q.correct
      };
    });

    state.catId = catId;
    state.catName = catName;
    state.questions = shuffledQuestions;
    state.index = 0;
    state.answers = shuffledQuestions.map(function(){ return { selectedIdx: null, isCorrect: null }; });

    $('test-cat-name').textContent = catName;
    showScreen('screen-test');
    renderQuestion();
  }

  function currentQ(){ return state.questions[state.index]; }
  function currentAnswer(){ return state.answers[state.index]; }

  function renderQuestion(){
    var q = currentQ();
    var ans = currentAnswer();
    var total = state.questions.length;

    $('test-progress-text').textContent = (state.index + 1) + ' / ' + total;
    $('progress-bar-fill').style.width = (((state.index) / total) * 100) + '%';

    $('q-text').textContent = q.q;

    var optionsWrap = $('options');
    optionsWrap.innerHTML = '';

    q.opts.forEach(function(optText, i){
      var btn = document.createElement('button');
      btn.className = 'option';
      btn.setAttribute('data-idx', i);
      btn.innerHTML =
        '<span class="opt-letter">' + LETTERS[i] + '</span>' +
        '<span class="opt-text"></span>' +
        '<span class="opt-icon"></span>';
      btn.querySelector('.opt-text').textContent = optText;
      btn.addEventListener('click', function(){ selectAnswer(i); });
      optionsWrap.appendChild(btn);
    });

    var shuffleBtn = $('btn-shuffle');
    var feedback = $('feedback-msg');
    feedback.className = 'feedback-msg';
    feedback.textContent = '';

    if (ans.selectedIdx !== null){
      applyLockedState(ans);
      shuffleBtn.disabled = true;
    } else {
      shuffleBtn.disabled = false;
    }

    $('btn-prev').disabled = state.index === 0;
    $('btn-next').disabled = ans.selectedIdx === null;
    $('btn-next').textContent = (state.index === total - 1) ? 'Tugatish' : 'Keyingisi';

    // re-trigger card entrance animation
    var card = $('question-card');
    card.style.animation = 'none';
    void card.offsetWidth;
    card.style.animation = '';
  }

  function applyLockedState(ans){
    var options = document.querySelectorAll('#options .option');
    var q = currentQ();
    options.forEach(function(opt){
      var idx = parseInt(opt.getAttribute('data-idx'), 10);
      opt.classList.add('locked');
      var icon = opt.querySelector('.opt-icon');
      if (idx === q.correct){
        opt.classList.add('correct-answer');
        icon.innerHTML = checkIcon();
      } else if (idx === ans.selectedIdx){
        opt.classList.add('wrong-answer');
        icon.innerHTML = crossIcon();
      } else {
        opt.classList.add('dimmed');
      }
    });
    var feedback = $('feedback-msg');
    feedback.classList.add('show');
    if (ans.isCorrect){
      feedback.classList.add('correct');
      feedback.innerHTML = checkIconSmall() + '<span>To\'g\'ri javob!</span>';
    } else {
      feedback.classList.add('incorrect');
      feedback.innerHTML = crossIconSmall() + '<span>Noto\'g\'ri javob.</span>';
    }
  }

  function selectAnswer(idx){
    var ans = currentAnswer();
    if (ans.selectedIdx !== null) return; // already locked

    var q = currentQ();
    ans.selectedIdx = idx;
    ans.isCorrect = (idx === q.correct);

    applyLockedState(ans);
    $('btn-shuffle').disabled = true;
    $('btn-next').disabled = false;
  }

  function shuffleCurrentOptions(){
    var ans = currentAnswer();
    if (ans.selectedIdx !== null) return;
    var q = currentQ();
    var correctText = q.opts[q.correct];
    var newOrder = shuffle(q.opts);
    q.opts = newOrder;
    q.correct = newOrder.indexOf(correctText);

    var btn = $('btn-shuffle');
    btn.classList.add('spin');
    setTimeout(function(){ btn.classList.remove('spin'); }, 500);

    renderQuestion();
  }

  function goNext(){
    var total = state.questions.length;
    if (state.index === total - 1){
      finishTest();
      return;
    }
    state.index++;
    renderQuestion();
  }

  function goPrev(){
    if (state.index === 0) return;
    state.index--;
    renderQuestion();
  }

  function finishTest(){
    var total = state.questions.length;
    var correctCount = state.answers.filter(function(a){ return a.isCorrect === true; }).length;
    var answeredCount = state.answers.filter(function(a){ return a.selectedIdx !== null; }).length;
    var incorrectCount = answeredCount - correctCount;
    var pct = Math.round((correctCount / total) * 100);

    $('results-cat-name').textContent = state.catName;
    $('stat-total').textContent = total;
    $('stat-correct').textContent = correctCount;
    $('stat-incorrect').textContent = incorrectCount + (total - answeredCount > 0 ? '' : '');

    var grade = gradeFor(pct);
    $('score-grade').textContent = grade.label;

    var circumference = 2 * Math.PI * 52;
    var ring = $('score-ring-fill');
    ring.setAttribute('stroke-dasharray', circumference.toFixed(1));
    ring.setAttribute('stroke-dashoffset', circumference.toFixed(1));
    ring.style.stroke = grade.color;

    $('score-pct').innerHTML = pct + '<span>%</span>';

    showScreen('screen-results');

    // animate ring after paint
    requestAnimationFrame(function(){
      requestAnimationFrame(function(){
        var offset = circumference * (1 - pct / 100);
        ring.setAttribute('stroke-dashoffset', offset.toFixed(1));
      });
    });

    renderReview();
  }

  function gradeFor(pct){
    if (pct >= 90) return { label: "A'lo", color: '#1e8e5a' };
    if (pct >= 80) return { label: 'Yaxshi', color: '#1e8e5a' };
    if (pct >= 70) return { label: 'Qoniqarli', color: '#3d6fd6' };
    if (pct >= 60) return { label: "O'rtacha", color: '#c98a1b' };
    return { label: 'Qoniqarsiz', color: '#c0392b' };
  }

  function renderReview(){
    var list = $('review-list');
    var wrap = $('review-wrap');
    list.innerHTML = '';

    var wrongItems = [];
    state.answers.forEach(function(ans, i){
      if (ans.isCorrect !== true){
        wrongItems.push({ q: state.questions[i], ans: ans });
      }
    });

    if (wrongItems.length === 0){
      wrap.querySelector('.review-section-title').style.display = 'none';
      var note = document.createElement('div');
      note.className = 'all-correct-note';
      note.textContent = "Barcha savollarga to'g'ri javob berdingiz. Ajoyib natija!";
      list.appendChild(note);
      return;
    }
    wrap.querySelector('.review-section-title').style.display = '';

    wrongItems.forEach(function(item){
      var div = document.createElement('div');
      div.className = 'review-item';

      var yourRow = '';
      if (item.ans.selectedIdx !== null){
        yourRow =
          '<div class="review-row your"><span class="tag">Sizning javobingiz</span><span class="txt"></span></div>';
      } else {
        yourRow =
          '<div class="review-row your"><span class="tag">Javob berilmadi</span><span class="txt"></span></div>';
      }

      div.innerHTML =
        '<div class="review-q"></div>' +
        yourRow +
        '<div class="review-row correct"><span class="tag">To\'g\'ri javob</span><span class="txt"></span></div>';

      div.querySelector('.review-q').textContent = item.q.q;
      var rows = div.querySelectorAll('.review-row .txt');
      if (item.ans.selectedIdx !== null){
        rows[0].textContent = item.q.opts[item.ans.selectedIdx];
        rows[1].textContent = item.q.opts[item.q.correct];
      } else {
        rows[0].textContent = '—';
        rows[1].textContent = item.q.opts[item.q.correct];
      }

      list.appendChild(div);
    });
  }

  function restartTest(){
    startTest(state.catId, state.catName);
  }

  // ---------- Icons ----------
  function checkIcon(){
    return '<svg viewBox="0 0 24 24" fill="none" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>';
  }
  function crossIcon(){
    return '<svg viewBox="0 0 24 24" fill="none" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>';
  }
  function checkIconSmall(){
    return '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>';
  }
  function crossIconSmall(){
    return '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>';
  }

  // ---------- Wire up events ----------
  function init(){
    renderHome();

    $('btn-shuffle').addEventListener('click', shuffleCurrentOptions);
    $('btn-next').addEventListener('click', goNext);
    $('btn-prev').addEventListener('click', goPrev);
    $('btn-finish').addEventListener('click', function(){
      var answeredCount = state.answers.filter(function(a){ return a.selectedIdx !== null; }).length;
      if (answeredCount < state.answers.length){
        var remaining = state.answers.length - answeredCount;
        var ok = confirm(remaining + " ta savolga hali javob berilmagan. Testni baribir yakunlashni xohlaysizmi?");
        if (!ok) return;
      }
      finishTest();
    });
    $('btn-home-from-test').addEventListener('click', function(){
      if (confirm('Testni tark etmoqchimisiz? Joriy natija saqlanmaydi.')){
        showScreen('screen-home');
      }
    });
    $('btn-home-from-results').addEventListener('click', function(){ showScreen('screen-home'); });
    $('btn-restart').addEventListener('click', restartTest);
  }

  document.addEventListener('DOMContentLoaded', init);
})();

</script>
</body>
</html>
